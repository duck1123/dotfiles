apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 00-master
  namespace: argocd
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    directory:
      jsonnet: {}
      recurse: true
    path: dev/apps
    repoURL: git@github.com:duck1123/argo-manifests.git
    targetRevision: master
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
